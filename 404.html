<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page not found · Buğrahan Yavuzdoğan</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">
<style>
:root{
  color-scheme:light dark;
  --bg:#ffffff;--text:#151515;--gray:#595959;--light:#767676;
}
@media (prefers-color-scheme: dark){
  :root{--bg:#121212;--text:#ececec;--gray:#9b9b9b;--light:#7c7c7c;}
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--text);
  font-family:"Inter Tight",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.7;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;text-align:center;
}
::selection{background:var(--text);color:var(--bg)}
.code{font-size:.78rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--light)}
h1{font-size:1.55rem;font-weight:600;letter-spacing:-.01em;margin-top:14px}
p{color:var(--gray);margin-top:10px}
.links{margin-top:26px;font-size:.95rem}
a{color:var(--text);text-decoration:underline;text-decoration-color:var(--light);text-underline-offset:3px;transition:text-decoration-color .15s ease}
a:hover{text-decoration-color:var(--text)}
.sep{color:var(--light);margin:0 10px}
</style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved.</p>
    <p class="links">
      <a href="/">Home</a><span class="sep">·</span><a href="/tr/">Türkçe</a>
    </p>
  </main>
</body>
</html>
